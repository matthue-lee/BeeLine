
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init-vector.sql:/docker-entrypoint-initdb.d/init-vector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11.0
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "${MEILISEARCH_HOST_PORT:-7700}:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion-api:
    build:
      context: .
    command: [
      "flask",
      "--app",
      "beeline_ingestor.app:create_app",
      "run",
      "--host",
      "0.0.0.0",
      "--port",
      "8000",
      "--reload"
    ]
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MEILISEARCH_URL: http://meilisearch:7700
      SECRET_KEY: ${SECRET_KEY:-dev-secret}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.0}
      SKIP_CREATE_ALL: ${SKIP_CREATE_ALL:-1}
      LOG_LEVEL: info
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-1}
      CURRENCY_CODE: ${CURRENCY_CODE:-NZD}
      CURRENCY_SYMBOL: ${CURRENCY_SYMBOL:-NZ$}
      USD_TO_LOCAL_RATE: ${USD_TO_LOCAL_RATE:-1.67}
      QUEUE_SERVICE_URL: ${QUEUE_SERVICE_URL:-http://queue-worker:9100}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    volumes:
      - ./:/app
    ports:
      - "${INGESTION_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion-worker:
    build:
      context: .
    command: [
      "python",
      "-m",
      "beeline_ingestor.scheduler.service"
    ]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MEILISEARCH_URL: http://meilisearch:7700
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.0}
      SKIP_CREATE_ALL: ${SKIP_CREATE_ALL:-1}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-1}
      SCHEDULER_METRICS_PORT: ${SCHEDULER_METRICS_PORT:-9101}
      SCHEDULER_RELEASE_ENABLED: ${SCHEDULER_RELEASE_ENABLED:-1}
      SCHEDULER_RELEASE_INTERVAL_MINUTES: ${SCHEDULER_RELEASE_INTERVAL_MINUTES:-60}
      SCHEDULER_RELEASE_INITIAL_DELAY_SECONDS: ${SCHEDULER_RELEASE_INITIAL_DELAY_SECONDS:-30}
      SCHEDULER_RELEASE_LOOKBACK_HOURS: ${SCHEDULER_RELEASE_LOOKBACK_HOURS:-6}
      SCHEDULER_RELEASE_SOURCE_LABEL: ${SCHEDULER_RELEASE_SOURCE_LABEL:-rss}
      SCHEDULER_NEWS_ENABLED: ${SCHEDULER_NEWS_ENABLED:-1}
      SCHEDULER_NEWS_INTERVAL_MINUTES: ${SCHEDULER_NEWS_INTERVAL_MINUTES:-1440}
      SCHEDULER_NEWS_INITIAL_DELAY_SECONDS: ${SCHEDULER_NEWS_INITIAL_DELAY_SECONDS:-60}
      CURRENCY_CODE: ${CURRENCY_CODE:-NZD}
      CURRENCY_SYMBOL: ${CURRENCY_SYMBOL:-NZ$}
      USD_TO_LOCAL_RATE: ${USD_TO_LOCAL_RATE:-1.67}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_ORGANIZATION_ID: ${OPENAI_ORGANIZATION_ID:-}
      OPENAI_PROJECT_ID: ${OPENAI_PROJECT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app

  queue-worker:
    build:
      context: ./workers
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      WORKER_QUEUE: ${WORKER_QUEUE:-ingest}
      WORKER_NAME: ${WORKER_NAME:-node-worker}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      WORKER_METRICS_PORT: ${WORKER_METRICS_PORT:-9100}
      START_ORCHESTRATOR: ${START_ORCHESTRATOR:-1}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    environment:
      GCLOUD_RW_API_KEY: ${GCLOUD_RW_API_KEY}
      GCLOUD_FM_URL: ${GCLOUD_FM_URL}
      GCLOUD_FM_COLLECTOR_ID: ${GCLOUD_FM_COLLECTOR_ID}
      GCLOUD_FM_HOSTED_ID: ${GCLOUD_FM_HOSTED_ID}
      GCLOUD_HOSTED_METRICS_URL: ${GCLOUD_HOSTED_METRICS_URL}
      GCLOUD_HOSTED_METRICS_ID: ${GCLOUD_HOSTED_METRICS_ID}
      GCLOUD_HOSTED_LOGS_URL: ${GCLOUD_HOSTED_LOGS_URL}
      GCLOUD_HOSTED_LOGS_ID: ${GCLOUD_HOSTED_LOGS_ID}
      GCLOUD_FM_LOG_PATH: /var/log/alloy/alloy.log
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy
      - alloy-logs:/var/log/alloy
    ports:
      - "${ALLOY_HTTP_PORT:-12345}:12345"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  meilidata:
  alloy-data:
  alloy-logs:
